<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulador PRO + Gráficas</title>
<style>
body{font-family:Arial;margin:0;background:#ffffff;color:#111}
.header{padding:10px;background:#e5e7eb;text-align:center}
.wrap{display:grid;grid-template-columns:300px 1fr;gap:10px;padding:10px}
.panel{background:#f3f4f6;padding:10px;border-radius:10px}
canvas{background:#ffffff;border:1px solid #ccc;border-radius:10px;margin-bottom:10px}
input[type=range]{width:100%}
button{margin-top:5px;padding:6px;border:none;border-radius:8px;cursor:pointer}
.value{font-size:12px;color:#333}
table{width:100%;font-size:12px;margin-top:10px;border-collapse:collapse}
td,th{border:1px solid #999;padding:3px;text-align:center}
</style>
</head>
<body>
<div class="header">Simulador PRO con Gráficas (Unidades SI)</div>
<div class="wrap">

<div class="panel">
Velocidad <input type="range" id="v" min="5" max="500" value="40"><div class="value" id="vVal"></div>
Ángulo <input type="range" id="ang" min="0" max="90" value="45"><div class="value" id="angVal"></div>
Gravedad <input type="range" id="g" min="1" max="20" value="9.8" step="0.1"><div class="value" id="gVal"></div>

Velocidad simulación
<input type="range" id="slow" min="0.1" max="1" step="0.1" value="1">
<div class="value" id="slowVal"></div>

<button onclick="disparar()">Disparar</button>
<button onclick="togglePause()" id="btnPause">⏸️ Pausa</button>
<button onclick="paso()">⏭️ Paso</button>
<button onclick="reset()">Reset</button>

<!-- TABLA DE ENSAYOS (debajo de botones) -->
<table id="tablaEnsayos" style="display:block; max-height:220px; overflow-y:auto; margin-top:10px;">
<tr><th>#</th><th>Ángulo (°)</th><th>v₀ (m/s)</th><th>Altura máx (m)</th><th>Alcance (m)</th><th>Tiempo (s)</th></tr>
</table>
</div>

<div>
<canvas id="cv" width="900" height="350"></canvas>
<canvas id="graf" width="900" height="220"></canvas>
</div>

</div>

</div>

<script>
const canvas = document.getElementById("cv");
const grafCanvas = document.getElementById("graf");
const ctx = canvas.getContext("2d");
const gctx = grafCanvas.getContext("2d");

const vInput = document.getElementById("v");
const angInput = document.getElementById("ang");
const gInput = document.getElementById("g");
const slowInput = document.getElementById("slow");

const vVal = document.getElementById("vVal");
const angVal = document.getElementById("angVal");
const gVal = document.getElementById("gVal");
const slowVal = document.getElementById("slowVal");

let ensayos = [];
let paused = false;
let animFrame = null;
let stepMode = false;
let currentDatos = [];
let currentTray = []; // trayectoria en tiempo real
let colores = ["blue","red","green","purple","orange","brown"];
let colorIndex = 0;
let currentColor = "black";

let escalaX = 4;
let escalaY = 4;

function actualizarValores(){
 vVal.textContent = "v = " + vInput.value + " m/s";
 angVal.textContent = "θ = " + angInput.value + "°";
 gVal.textContent = "g = " + gInput.value + " m/s²";
 slowVal.textContent = "Velocidad = " + slowInput.value + "x";
}
setInterval(actualizarValores,100);

function disparar(){
 paused = false;
 stepMode = false;
 let v0 = parseFloat(vInput.value);
 let angulo = parseFloat(angInput.value) * Math.PI / 180;
 let gValor = parseFloat(gInput.value);
 let slow = parseFloat(slowInput.value);

 let vx = v0 * Math.cos(angulo);
 let vy0 = v0 * Math.sin(angulo);

 let t=0, dt=0.05 * slow;
 let tray=[];
 currentDatos=[];
 currentTray = [];
 currentColor = colores[colorIndex++ % colores.length];

 function anim(){
  if(paused && !stepMode){
    animFrame = requestAnimationFrame(anim);
    return;
  }
  let x = vx * t;
  let y = vy0 * t - 0.5 * gValor * t * t;
  let vy = vy0 - gValor * t; // velocidad vertical instantánea

  tray.push({x,y});
  currentTray.push({x,y});
  currentDatos.push({t,x,y});

  dibujar(x,y,vx,vy);
  graficar(vx,vy0);

  if(y>=0){
   t+=dt;
   animFrame = requestAnimationFrame(anim);
   stepMode = false;
  } else {
   // cálculos físicos
   let tiempoTotal = t;
   let alcance = vx * tiempoTotal;
   let alturaMax = (vy0*vy0)/(2*gValor);

   ensayos.push({tray, datos:[...currentDatos], vx, vy:vy0, color:currentColor});
   currentTray = [];

   // agregar a tabla
   let tabla = document.getElementById("tablaEnsayos");
   let fila = tabla.insertRow();
   let i = tabla.rows.length - 1;
   fila.insertCell(0).innerText = i;
   fila.insertCell(1).innerText = (angulo*180/Math.PI).toFixed(1);
   fila.insertCell(2).innerText = v0.toFixed(1);
   fila.insertCell(3).innerText = alturaMax.toFixed(2);
   fila.insertCell(4).innerText = alcance.toFixed(2);
   fila.insertCell(5).innerText = tiempoTotal.toFixed(2);
   currentDatos=[];
  }
 }
 anim();
}

function dibujar(xActual,yActual,vxActual=0,vyActual=0){

 // === ESCALA DINÁMICA ===
 let maxX = 200;
 let maxY = 100;

 ensayos.forEach(e=>{
  e.tray.forEach(p=>{
    if(p.x>maxX) maxX=p.x;
    if(p.y>maxY) maxY=p.y;
  });
 });

 currentTray.forEach(p=>{
   if(p.x>maxX) maxX=p.x;
   if(p.y>maxY) maxY=p.y;
 });

 // evitar división por cero
 maxX = Math.max(maxX,10);
 maxY = Math.max(maxY,10);

 escalaX = 800 / (maxX*1.1);
 escalaY = 250 / (maxY*1.1);
 ctx.clearRect(0,0,900,350);

 ctx.font = "12px Arial";

 // === EJES CON COLORES ===
 // Eje X (rojo)
 ctx.strokeStyle = "red";
 ctx.beginPath();
 ctx.moveTo(50,300);
 ctx.lineTo(850,300);
 ctx.stroke();

 // Eje Y (azul)
 ctx.strokeStyle = "blue";
 ctx.beginPath();
 ctx.moveTo(50,300);
 ctx.lineTo(50,50);
 ctx.stroke();

 ctx.fillStyle = "black";

 // === MARCAS Y VALORES EN SI DINÁMICAS ===
 let pasoX = maxX>1000?500:(maxX>500?200:(maxX>200?50:20));
 for(let val=0; val<=maxX; val+=pasoX){
   let x = 50 + val*escalaX;
   ctx.beginPath();
   ctx.moveTo(x,295);
   ctx.lineTo(x,305);
   ctx.strokeStyle="red";
   ctx.stroke();
   let etiquetaX = val>=1000 ? (val/1000).toFixed(1)+" km" : val.toFixed(0)+" m";
   ctx.fillText(etiquetaX, x-15, 320);
 }

 let pasoY = maxY>200?50:(maxY>100?20:10);
 for(let val=0; val<=maxY; val+=pasoY){
   let y = 300 - val*escalaY;
   ctx.beginPath();
   ctx.moveTo(45,y);
   ctx.lineTo(55,y);
   ctx.stroke();
   let etiquetaY = val>=1000 ? (val/1000).toFixed(1)+" km" : val.toFixed(0)+" m";
   ctx.fillText(etiquetaY, 5, y+4);
 }

 ctx.fillText("Distancia (m)",400,340);
 ctx.fillText("Altura (m)",5,40);

 // === CAÑÓN ===
 ctx.fillRect(40,290,20,10);
 ctx.save();
 ctx.translate(50,300);
 let angRad = parseFloat(angInput.value)*Math.PI/180;
 ctx.rotate(-angRad);
 ctx.fillRect(0,-5,30,10);
 ctx.restore();

 // === VELOCIDADES EN TIEMPO REAL ===
 ctx.fillText(`Vx = ${vxActual.toFixed(2)} m/s`, 650, 60);
 ctx.fillText(`Vy = ${vyActual.toFixed(2)} m/s`, 650, 80);

 // Ensayos anteriores (segmentados)
 ensayos.forEach(e=>{
  ctx.beginPath();
  ctx.setLineDash([6,4]);
  e.tray.forEach((p,i)=>{
   let px = 50 + p.x * escalaX;
   let py = 300 - p.y * escalaY;
   if(i===0) ctx.moveTo(px,py);
   else ctx.lineTo(px,py);
  });
  ctx.strokeStyle=e.color;
  ctx.stroke();
  ctx.setLineDash([]);
 });

 // Trayectoria actual (segmentada)
 if(currentTray.length>0){
  ctx.beginPath();
  ctx.setLineDash([5,5]);
  currentTray.forEach((p,i)=>{
    let px = 50 + p.x * escalaX;
    let py = 300 - p.y * escalaY;
    if(i===0) ctx.moveTo(px,py);
    else ctx.lineTo(px,py);
  });
  ctx.strokeStyle=currentColor;
  ctx.stroke();
  ctx.setLineDash([]);
 }

 // === PUNTOS CLAVE ===
 // Punto inicial
 let x0 = 0;
 let y0 = 0;
 let px0 = 50 + x0 * escalaX;
 let py0 = 300 - y0 * escalaY;
 ctx.fillStyle = "green";
 ctx.beginPath();
 ctx.arc(px0,py0,5,0,2*Math.PI);
 ctx.fill();
 ctx.fillText("Inicio (0,0)", px0+5, py0-5);

 // Si hay datos actuales, calcular punto máximo
 if(currentDatos.length>0){
   let max = currentDatos.reduce((a,b)=> b.y>a.y?b:a);
   let pxm = 50 + max.x * escalaX;
   let pym = 300 - max.y * escalaY;
   ctx.fillStyle = "orange";
   ctx.beginPath();
   ctx.arc(pxm,pym,5,0,2*Math.PI);
   ctx.fill();
   ctx.fillText(`Alt máx (${max.x.toFixed(1)}, ${max.y.toFixed(1)})`, pxm+5, pym-5);
 }

 // Si terminó, marcar alcance
 if(ensayos.length>0){
   let last = ensayos[ensayos.length-1];
   let fin = last.tray[last.tray.length-1];
   let pxf = 50 + fin.x * escalaX;
   let pyf = 300;
   ctx.fillStyle = "red";
   ctx.beginPath();
   ctx.arc(pxf,pyf,5,0,2*Math.PI);
   ctx.fill();
   ctx.fillText(`Alcance (${fin.x.toFixed(1)}, 0)`, pxf+5, pyf-5);
 }

 // Proyectil actual
 let px = 50 + xActual * escalaX;
 let py = 300 - yActual * escalaY;
 ctx.beginPath();
 ctx.arc(px,py,5,0,2*Math.PI);
 ctx.fillStyle="black";
 ctx.fill();
}

function graficar(vx=0,vy=0){
 gctx.clearRect(0,0,900,220);

 // Ejes
 gctx.beginPath();
 gctx.moveTo(40,200);
 gctx.lineTo(850,200);
 gctx.moveTo(40,200);
 gctx.lineTo(40,20);
 gctx.stroke();
 gctx.fillText("Tiempo (s)",400,215);
 gctx.fillText("Altura (m)",5,20);

 // Ensayos anteriores + SUS VELOCIDADES
 ensayos.forEach((e,index)=>{
  gctx.beginPath();
  e.datos.forEach((d,i)=>{
   let px = 40 + d.t*40;
   let py = 200 - d.y*2;
   if(i===0) gctx.moveTo(px,py);
   else gctx.lineTo(px,py);
  });
  gctx.strokeStyle=e.color;
  gctx.stroke();

  // Mostrar velocidades de cada ensayo
  gctx.fillStyle=e.color;
  gctx.fillText(`Ensayo ${index+1}`,600,30+index*20);
  gctx.fillText(`Vx₀=${e.vx.toFixed(1)}`,700,30+index*20);
  gctx.fillText(`Vy₀=${e.vy.toFixed(1)}`,780,30+index*20);
 });

 // Ensayo actual (EN VIVO)
 if(currentDatos.length>0){
  gctx.beginPath();
  currentDatos.forEach((d,i)=>{
   let px = 40 + d.t*40;
   let py = 200 - d.y*2;
   if(i===0) gctx.moveTo(px,py);
   else gctx.lineTo(px,py);
  });
  gctx.strokeStyle=currentColor;
  gctx.stroke();

  // Velocidades actuales (A LA IZQUIERDA)
  gctx.fillStyle=currentColor;
  gctx.fillText(`(Actual)`,60,40);
  gctx.fillText(`Vx₀=${vx.toFixed(1)} m/s`,60,60);
  gctx.fillText(`Vy₀=${vy.toFixed(1)} m/s`,60,80);
 }
}

function togglePause(){
 paused = !paused;
 const btn = document.getElementById("btnPause");
 btn.textContent = paused ? "▶️ Reanudar" : "⏸️ Pausa";
}

function paso(){
 paused = true;
 stepMode = true;
 animFrame = requestAnimationFrame(()=>{});
}

function reset(){
 ensayos=[];
 currentDatos=[];
 document.getElementById("tablaEnsayos").innerHTML = `<tr><th>#</th><th>Ángulo (°)</th><th>v₀ (m/s)</th><th>Altura máx (m)</th><th>Alcance (m)</th><th>Tiempo (s)</th></tr>`;
 ensayos=[];
 currentDatos=[];
 ctx.clearRect(0,0,900,350);
 gctx.clearRect(0,0,900,220);
}

// inicial
dibujar(0,0);
graficar();
</script>
</body>
</html>
